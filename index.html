<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0a3d2b"/>
<meta name="description" content="WhatsApp seseorang tanpa perlu simpan nombor. Masukkan nombor Malaysia dan terus buka WhatsApp."/>
<title>WA Tanpa Save</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g1:#25d366;--g2:#128c4e;--gdark:#0a3d2b;
  --cream:#f2ede4;--card:#fff;--border:#ddd6c8;
  --txt:#111;--muted:#6b7b73;--err:#c0392b;
  --r:18px;--rcard:24px;
}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  min-height:100%;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:var(--cream);
  color:var(--txt);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:max(env(safe-area-inset-top),16px) 16px max(env(safe-area-inset-bottom),16px);
  -webkit-font-smoothing:antialiased;
}

/* ── LANG TOGGLE ── */
.lang-bar{
  width:100%;max-width:420px;
  display:flex;justify-content:flex-end;
  margin-bottom:10px;
}
.lang-toggle{
  display:flex;
  background:#e4ddd3;
  border-radius:99px;
  padding:3px;
  gap:2px;
}
.lang-toggle button{
  border:none;background:transparent;cursor:pointer;
  font-family:inherit;font-size:.72rem;font-weight:700;
  padding:5px 14px;border-radius:99px;
  color:var(--muted);
  transition:background .18s,color .18s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.lang-toggle button.active{
  background:#fff;
  color:var(--gdark);
  box-shadow:0 1px 4px rgba(0,0,0,.1);
}

/* ── CARD ── */
.card{
  background:var(--card);
  border-radius:var(--rcard);
  box-shadow:0 8px 32px rgba(0,0,0,.10),0 1px 0 rgba(255,255,255,.8) inset;
  padding:32px 28px 28px;
  width:100%;max-width:420px;
  animation:up .45s cubic-bezier(.22,1,.36,1) both;
}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── HEADER ── */
.header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.wa-icon{
  width:48px;height:48px;flex-shrink:0;
  background:linear-gradient(145deg,var(--g1),var(--g2));
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(37,211,102,.35);
}
.wa-icon svg{width:26px;height:26px;fill:#fff}
.header-text h1{font-size:.98rem;font-weight:800;color:var(--gdark);line-height:1.25;letter-spacing:-.2px}
.header-text p{font-size:.7rem;font-weight:500;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* ── LABEL ── */
.field-label{
  display:block;
  font-size:.7rem;font-weight:700;
  color:var(--muted);letter-spacing:.7px;text-transform:uppercase;
  margin-bottom:8px;
}

/* ── INPUT ── */
.input-wrap{position:relative;margin-bottom:6px}
.flag{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  font-size:1.15rem;line-height:1;pointer-events:none;
}
input[type=text]{
  width:100%;
  padding:14px 14px 14px 46px;
  font-family:inherit;font-size:1.05rem;font-weight:600;
  color:var(--txt);
  background:var(--cream);
  border:2px solid var(--border);
  border-radius:var(--r);
  outline:none;
  -webkit-appearance:none;appearance:none;
  transition:border-color .18s,box-shadow .18s;
  letter-spacing:.4px;
}
input[type=text]::placeholder{color:#b5bdb9;font-weight:400;font-size:.95rem}
input[type=text]:focus{border-color:var(--g1);box-shadow:0 0 0 3px rgba(37,211,102,.15)}
input[type=text].is-error{border-color:var(--err);box-shadow:0 0 0 3px rgba(192,57,43,.10)}

/* ── ERROR + PREVIEW ── */
.msg-row{min-height:22px;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.error-txt{font-size:.75rem;font-weight:600;color:var(--err);display:none}
.error-txt.show{display:block}
.clean-pill{
  display:none;align-items:center;gap:5px;
  background:rgba(37,211,102,.1);border:1.5px solid rgba(37,211,102,.25);
  border-radius:99px;padding:3px 10px 3px 7px;
  font-size:.78rem;font-weight:700;color:var(--g2);
}
.clean-pill.show{display:inline-flex}
.clean-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--g1);flex-shrink:0}

/* ── BUTTON ── */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:16px;
  background:linear-gradient(135deg,#25d366,#128c4e);
  color:#fff;border:none;border-radius:var(--r);
  font-family:inherit;font-size:.98rem;font-weight:800;
  cursor:pointer;letter-spacing:.1px;
  box-shadow:0 6px 20px rgba(37,211,102,.38);
  -webkit-tap-highlight-color:transparent;
  transition:transform .13s,box-shadow .13s,opacity .13s;
  touch-action:manipulation;
}
.btn svg{width:20px;height:20px;fill:#fff;flex-shrink:0}
.btn:active{transform:scale(.97);box-shadow:0 2px 10px rgba(37,211,102,.25);opacity:.92}
@media(hover:hover){.btn:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(37,211,102,.46)}}

/* ── EXAMPLES ── */
.examples{margin-top:20px;background:var(--cream);border-radius:14px;padding:14px 16px}
.examples-title{font-size:.68rem;font-weight:700;color:var(--muted);letter-spacing:.7px;text-transform:uppercase;margin-bottom:9px}
.ex{
  display:flex;align-items:center;gap:6px;margin-bottom:6px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  padding:4px 0;touch-action:manipulation;
}
.ex:last-child{margin-bottom:0}
.ex:active .ex-raw,.ex:active .ex-clean{opacity:.6}
.ex-raw{
  font-size:.73rem;font-weight:600;font-family:'Courier New',Courier,monospace;
  background:#ddd6c8;color:var(--txt);padding:2px 7px;border-radius:5px;white-space:nowrap;
}
.ex-arr{font-size:.65rem;color:var(--muted);flex-shrink:0}
.ex-clean{font-size:.73rem;font-weight:700;font-family:'Courier New',Courier,monospace;color:var(--g2)}

/* ── FOOTER ── */
.footer{
  margin-top:16px;font-size:.68rem;color:var(--muted);text-align:center;
  max-width:320px;line-height:1.5;
  animation:up .45s .1s cubic-bezier(.22,1,.36,1) both;
}

/* ── RESPONSIVE ── */
@media(max-width:380px){
  .card{padding:26px 18px 22px;border-radius:20px}
  input[type=text]{font-size:.95rem;padding:13px 13px 13px 44px}
  .btn{font-size:.9rem;padding:14px}
}
</style>
</head>
<body>

<div class="lang-bar">
  <div class="lang-toggle" role="group" aria-label="Language">
    <button id="btn-bm" class="active" onclick="setLang('bm')">BM</button>
    <button id="btn-en" onclick="setLang('en')">EN</button>
  </div>
</div>

<div class="card">
  <div class="header">
    <div class="wa-icon">
      <svg viewBox="0 0 32 32"><path d="M16 2C8.27 2 2 8.27 2 16c0 2.52.67 4.9 1.83 6.94L2 30l7.29-1.79A13.93 13.93 0 0 0 16 30c7.73 0 14-6.27 14-14S23.73 2 16 2zm7.07 19.49c-.29.82-1.71 1.57-2.33 1.63-.61.05-1.2.28-4.03-.84-3.41-1.35-5.58-4.85-5.75-5.07-.17-.22-1.39-1.85-1.39-3.53s.88-2.5 1.19-2.84c.31-.34.68-.43.91-.43.22 0 .45.002.65.01.21.01.49-.08.76.58.28.68 1.02 2.48.11 2.78-.91.31-1.25.62-1.25 1.23 0 .62 1.58 2.84 2.29 3.56.72.72 2.26 1.48 2.72 1.65.45.16.72.14 1.01-.14.29-.28.97-.97 1.22-.97.25 0 1.28.51 1.5.62.23.11.38.17.43.27.06.1.06.56-.23 1.38z"/></svg>
    </div>
    <div class="header-text">
      <h1 id="h-title">WA Tanpa Save Nombor</h1>
      <p id="h-sub">Malaysia · +60</p>
    </div>
  </div>

  <label class="field-label" for="phone" id="lbl-phone">Nombor Telefon</label>
  <div class="input-wrap">
    <span class="flag">🇲🇾</span>
    <input type="text" id="phone" autocomplete="off" inputmode="tel"
           placeholder="011 1172 8210 atau +60 11-1172 8210"/>
  </div>

  <div class="msg-row">
    <span class="error-txt" id="error-txt"></span>
    <span class="clean-pill" id="clean-pill">
      <span class="dot"></span>
      <span id="clean-num"></span>
    </span>
  </div>

  <button class="btn" id="wa-btn" onclick="openWA()">
    <svg viewBox="0 0 32 32"><path d="M16 2C8.27 2 2 8.27 2 16c0 2.52.67 4.9 1.83 6.94L2 30l7.29-1.79A13.93 13.93 0 0 0 16 30c7.73 0 14-6.27 14-14S23.73 2 16 2zm7.07 19.49c-.29.82-1.71 1.57-2.33 1.63-.61.05-1.2.28-4.03-.84-3.41-1.35-5.58-4.85-5.75-5.07-.17-.22-1.39-1.85-1.39-3.53s.88-2.5 1.19-2.84c.31-.34.68-.43.91-.43.22 0 .45.002.65.01.21.01.49-.08.76.58.28.68 1.02 2.48.11 2.78-.91.31-1.25.62-1.25 1.23 0 .62 1.58 2.84 2.29 3.56.72.72 2.26 1.48 2.72 1.65.45.16.72.14 1.01-.14.29-.28.97-.97 1.22-.97.25 0 1.28.51 1.5.62.23.11.38.17.43.27.06.1.06.56-.23 1.38z"/></svg>
    <span id="btn-label">WhatsApp Sekarang</span>
  </button>

  <div class="examples">
    <div class="examples-title" id="ex-title">Contoh · Klik untuk cuba</div>
    <div class="ex" onclick="tryEx('011 1172 8210')">
      <span class="ex-raw">011 1172 8210</span><span class="ex-arr">→</span><span class="ex-clean">601111728210</span>
    </div>
    <div class="ex" onclick="tryEx('011-1172 8210')">
      <span class="ex-raw">011-1172 8210</span><span class="ex-arr">→</span><span class="ex-clean">601111728210</span>
    </div>
    <div class="ex" onclick="tryEx('+60 11-1172 8210')">
      <span class="ex-raw">+60 11-1172 8210</span><span class="ex-arr">→</span><span class="ex-clean">601111728210</span>
    </div>
    <div class="ex" onclick="tryEx('1111728210')">
      <span class="ex-raw">1111728210</span><span class="ex-arr">→</span><span class="ex-clean">601111728210</span>
    </div>
    <div class="ex" onclick="tryEx('03-2161 4455')">
      <span class="ex-raw">03-2161 4455</span><span class="ex-arr">→</span><span class="ex-clean">60321614455</span>
    </div>
    <div class="ex" onclick="tryEx('+603 8888 2525')">
      <span class="ex-raw">+603 8888 2525</span><span class="ex-arr">→</span><span class="ex-clean">60388882525</span>
    </div>
  </div>
</div>

<p class="footer" id="footer-txt">Tiada nombor disimpan. Semua diproses dalam pelayar anda sahaja.</p>

<script>
/* ── TRANSLATIONS ── */
var T={
  bm:{title:'WA Tanpa Save Nombor',sub:'Malaysia · +60',lbl:'Nombor Telefon',
      ph:'011 1172 8210 atau +60 11-1172 8210',btn:'WhatsApp Sekarang',
      exTitle:'Contoh · Klik untuk cuba',
      errBlank:'Sila masukkan nombor telefon.',errBad:'Nombor tidak sah. Sila semak semula.',
      footer:'Tiada nombor disimpan. Semua diproses dalam pelayar anda sahaja.'},
  en:{title:'WA Without Saving Number',sub:'Malaysia · +60',lbl:'Phone Number',
      ph:'011 1172 8210 or +60 11-1172 8210',btn:'WhatsApp Now',
      exTitle:'Examples · Tap to try',
      errBlank:'Please enter a phone number.',errBad:'Invalid number. Please check again.',
      footer:'No number is saved. Everything is processed in your browser only.'}
};
var lang='bm';

function setLang(l){
  lang=l;
  document.getElementById('btn-bm').classList.toggle('active',l==='bm');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  var t=T[l];
  document.getElementById('h-title').textContent=t.title;
  document.getElementById('lbl-phone').textContent=t.lbl;
  document.getElementById('phone').placeholder=t.ph;
  document.getElementById('btn-label').textContent=t.btn;
  document.getElementById('ex-title').textContent=t.exTitle;
  document.getElementById('footer-txt').textContent=t.footer;
  updatePreview();
}

/* ── NUMBER CLEANING ──
   Tested cases:
   "011 1172 8210"       → 601111728210
   "011-1172 8210"       → 601111728210
   "+60 11-1172 8210"    → 601111728210
   "+6011-11728210"      → 601111728210
   "1111728210"          → 601111728210  (no 0, no 60 prefix)
   "601111728210"        → 601111728210  (already clean)
   "03-2161 4455"        → 60321614455
   "+603 8888 2525"      → 60388882525
   "0321614455"          → 60321614455
   "  +60  11 - 1172 8210  " → 601111728210 (whitespace/mixed)
*/
function clean(raw){
  if(!raw||!raw.trim())return null;
  var d=raw.replace(/\D/g,'');          // digits only
  if(!d)return null;

  if(d.indexOf('60')===0){
    // already has country code
  }else if(d.charAt(0)==='0'){
    d='60'+d.slice(1);                  // 011... → 6011...
  }else{
    d='60'+d;                           // 111... → 60111...
  }

  var local=d.slice(2);                 // part after '60'
  if(local.length<7||local.length>10)return null;
  return d;
}

/* ── UI ── */
var phoneEl=document.getElementById('phone');
var pillEl=document.getElementById('clean-pill');
var numEl=document.getElementById('clean-num');
var errEl=document.getElementById('error-txt');

function updatePreview(){
  var r=clean(phoneEl.value);
  if(r){numEl.textContent=r;pillEl.classList.add('show');}
  else{pillEl.classList.remove('show');}
}

function openWA(){
  var raw=phoneEl.value.trim();
  errEl.classList.remove('show');
  phoneEl.classList.remove('is-error');
  if(!raw){showErr(T[lang].errBlank);shake();return;}
  var r=clean(raw);
  if(!r){showErr(T[lang].errBad);phoneEl.classList.add('is-error');shake();return;}
  window.open('https://wa.me/'+r,'_blank');
}

function showErr(msg){
  errEl.textContent=msg;errEl.classList.add('show');pillEl.classList.remove('show');
}

function shake(){
  phoneEl.animate(
    [{transform:'translateX(0)'},{transform:'translateX(-7px)'},{transform:'translateX(7px)'},
     {transform:'translateX(-4px)'},{transform:'translateX(4px)'},{transform:'translateX(0)'}],
    {duration:300,easing:'ease-in-out'}
  );
}

function tryEx(val){
  phoneEl.value=val;
  phoneEl.classList.remove('is-error');
  errEl.classList.remove('show');
  updatePreview();
}

phoneEl.addEventListener('input',function(){
  phoneEl.classList.remove('is-error');
  errEl.classList.remove('show');
  updatePreview();
});
phoneEl.addEventListener('keydown',function(e){if(e.key==='Enter')openWA();});
</script>
</body>
</html>
