<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Rounded square background -->
  <rect width="192" height="192" rx="42" fill="#0d6e3f"/>

  <!-- Smartphone body -->
  <rect x="52" y="30" width="68" height="108" rx="11"
        fill="none" stroke="#fff" stroke-width="7.5"/>
  <!-- Screen area -->
  <rect x="62" y="44" width="48" height="68" rx="5" fill="rgba(255,255,255,0.15)"/>
  <!-- Home button dot -->
  <circle cx="86" cy="128" r="5.5" fill="#fff"/>

  <!-- Badge circle (launch indicator) -->
  <circle cx="138" cy="138" r="30" fill="#25d366"/>

  <!-- Arrow pointing up-right (open/launch) -->
  <line x1="125" y1="151" x2="148" y2="128"
        stroke="#fff" stroke-width="6.5" stroke-linecap="round"/>
  <polyline points="133,126 149,126 149,142"
            fill="none" stroke="#fff" stroke-width="6.5"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
